name: Weekly AI Digest

on:
  schedule:
    - cron: '50 5 * * 1'  # Poniedziałek 7:50 CEST (lato) / 6:50 CET (zima)
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai notion-client

      - name: Generate AI digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python ai-digest/generate_digest.py

      - name: Commit and push digest
        run: |
          git config user.name "AI Digest Bot"
          git config user.email "bot@daplo.ai"
          git add ai-digest/outputs/
          git diff --staged --quiet || git commit -m "digest: AI weekly digest $(date +%Y-%m-%d)"
          git push
